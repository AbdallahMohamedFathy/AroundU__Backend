<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AroundU</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        .auth-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            padding: 40px;
        }

        .auth-header {
            margin-bottom: 3rem;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            font-size: 0.95rem;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2c5f7c;
            box-shadow: 0 0 0 4px rgba(44, 95, 124, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2c5f7c 0%, #5ba3c5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(44, 95, 124, 0.3);
            transition: transform 0.2s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-social {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            border-color: #2c5f7c;
            background: #f9fafb;
        }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #2c5f7c;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <button class="back-button" onclick="window.location.href='welcome.html'">←</button>
            <h1 class="auth-title">Welcome Back!</h1>
            <p class="auth-subtitle">Login to continue exploring</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="divider">Or continue with</div>

        <div class="social-buttons">
            <button class="btn-social" onclick="alert('Google login not implemented yet')">
                <span>🔵</span> Continue with Google
            </button>
            <button class="btn-social" onclick="alert('Facebook login not implemented yet')">
                <span>🔷</span> Continue with Facebook
            </button>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script src="../shared/js/auth.js"></script>
    <script src="../shared/js/api.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const button = event.target.querySelector('button[type="submit"]');
            showLoading(button);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await api.login(email, password);
                saveCurrentUser(result.user);
                showSuccess('Welcome back!');
                setTimeout(() => {
                    window.location.href = 'places.html';
                }, 500);
            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
                hideLoading(button);
            }
        }
    </script>
</body>

</html>
