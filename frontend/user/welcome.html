<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AroundU</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        .welcome-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2c5f7c 0%, #5ba3c5 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(44, 95, 124, 0.3);
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 3rem;
            text-align: center;
        }

        .welcome-buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-welcome {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: none;
        }

        .btn-welcome:hover {
            transform: translateY(-2px);
        }

        .btn-login {
            background: linear-gradient(135deg, #2c5f7c 0%, #5ba3c5 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(44, 95, 124, 0.3);
        }

        .btn-signup {
            background: white;
            color: #2c5f7c;
            border: 2px solid #2c5f7c;
        }
    </style>
</head>

<body>
    <div class="welcome-container">
        <div class="welcome-logo">🌍</div>
        <h1 class="welcome-title">Welcome</h1>
        <p class="welcome-subtitle">Please login or create an account to continue</p>

        <div class="welcome-buttons">
            <button class="btn-welcome btn-login" onclick="window.location.href='login.html'">
                Login
            </button>
            <button class="btn-welcome btn-signup" onclick="window.location.href='signup.html'">
                Sign Up
            </button>
        </div>
    </div>
</body>

</html>
